<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhysicsKitchen</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #111;
        color: #eee;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      #toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 6px 8px;
        background: #222;
        border-bottom: 1px solid #444;
      }

      .toolbar-group {
        display: flex;
        gap: 4px;
        border-right: 1px solid #444;
        padding-right: 6px;
      }

      .toolbar-group:last-child {
        border-right: none;
      }

      .toolbar-btn {
        background: #333;
        color: #ccc;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 4px 10px;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }

      .toolbar-btn:hover { background: #444; color: #fff; }
      .toolbar-btn.active { background: #556; color: #fff; border-color: #88f; }

      #canvas-container {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      #simulation-canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }

      #status-bar {
        padding: 4px 10px;
        background: #1a1a1a;
        border-top: 1px solid #333;
        font-size: 12px;
        color: #aaa;
        min-height: 24px;
      }
    </style>
  </head>
  <body>
    <div id="toolbar"></div>
    <div id="canvas-container">
      <canvas id="simulation-canvas"></canvas>
    </div>
    <div id="status-bar"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

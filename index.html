<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhysicsKitchen</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #111;
        color: #eee;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Top bar: simulation controls + select ── */
      #top-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        background: #222;
        border-bottom: 1px solid #444;
        flex-shrink: 0;
      }

      #top-bar .top-btn {
        background: #333;
        color: #ccc;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 4px 14px;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }

      #top-bar .top-btn:hover  { background: #444; color: #fff; }
      #top-bar .top-btn.active { background: #556; color: #fff; border-color: #88f; }
      #top-bar .top-btn:disabled { opacity: 0.35; cursor: default; }

      #top-bar .separator {
        width: 1px;
        height: 22px;
        background: #444;
        margin: 0 4px;
      }

      /* ── Main area: sidebar + canvas ── */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Left sidebar: shape + joint tools ── */
      #sidebar {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 8px 6px;
        background: #1c1c1c;
        border-right: 1px solid #444;
        overflow-y: auto;
        flex-shrink: 0;
        width: 130px;
      }

      .sidebar-group-label {
        font-size: 10px;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 6px 4px 2px;
      }

      .sidebar-group-label:first-child {
        padding-top: 2px;
      }

      .sidebar-btn {
        background: #2a2a2a;
        color: #ccc;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 5px 8px;
        cursor: pointer;
        font-size: 12px;
        text-align: left;
        width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .sidebar-btn:hover  { background: #383838; color: #fff; }
      .sidebar-btn.active { background: #334; color: #fff; border-color: #88f; }

      /* ── Canvas area ── */
      #canvas-container {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      #simulation-canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }

      /* ── Status bar ── */
      #status-bar {
        padding: 4px 10px;
        background: #1a1a1a;
        border-top: 1px solid #333;
        font-size: 12px;
        color: #aaa;
        min-height: 24px;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="top-bar"></div>
    <div id="main">
      <div id="sidebar"></div>
      <div id="canvas-container">
        <canvas id="simulation-canvas"></canvas>
      </div>
    </div>
    <div id="status-bar"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
